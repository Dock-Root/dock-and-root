<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="post-title">Blog Post — Dock & Root Labs</title>
    <meta name="description" content="Blog post from Dock and Root Labs.">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚓</text></svg>">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>

<body>

    <header id="navbar"></header>

    <main class="page-content">
        <div class="container" style="max-width:900px">

            <!-- Breadcrumb -->
            <div style="margin-bottom:24px;font-size:0.85rem;color:var(--text-muted);font-family:var(--font-mono)">
                <a href="index.html" style="color:var(--text-muted);text-decoration:none">blog</a>
                <span style="margin:0 8px">/</span>
                <span id="bc-slug" style="color:var(--accent-green)">—</span>
            </div>

            <!-- Not found -->
            <div id="not-found" class="empty-state hidden">
                <div class="empty-state-icon">📭</div>
                <h3>Post not found</h3>
                <p>That post doesn't exist or the URL is wrong.</p>
                <a href="index.html" class="btn btn-secondary" style="margin-top:16px">← Back to Blog</a>
            </div>

            <!-- Post -->
            <div id="post-wrapper" class="hidden">
                <!-- Header -->
                <div
                    style="text-align:center;padding:32px 0 48px;border-bottom:1px solid var(--border-subtle);margin-bottom:48px">
                    <div id="post-emoji" style="font-size:3.5rem;margin-bottom:20px"></div>
                    <div id="post-tags"
                        style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:16px"></div>
                    <h1 id="post-heading" style="font-size:2rem;font-weight:800;margin-bottom:16px"></h1>
                    <div id="post-meta"
                        style="font-family:var(--font-mono);font-size:0.8rem;color:var(--text-muted);display:flex;justify-content:center;gap:16px;flex-wrap:wrap">
                    </div>
                </div>

                <!-- Content -->
                <article class="prose" id="post-content" style="margin:0 auto">
                    <div id="post-loading"
                        style="text-align:center;color:var(--text-muted);padding:48px;font-family:var(--font-mono)">
                        Loading post…</div>
                </article>

                <!-- Footer Nav -->
                <div
                    style="margin-top:64px;padding-top:32px;border-top:1px solid var(--border-subtle);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px">
                    <a href="index.html" class="btn btn-secondary">← All Posts</a>
                    <a href="../labs.html" class="btn btn-ghost">Explore Labs →</a>
                </div>
            </div>

        </div>
    </main>

    <footer id="footer"></footer>

    <!-- Marked.js + Highlight.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/blog.js"></script>
    <script>
        renderNavbar('blog');
        renderFooter();

        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');
        const post = slug ? getPostBySlug(slug) : null;

        if (!post) {
            document.getElementById('not-found').classList.remove('hidden');
        } else {
            document.getElementById('post-wrapper').classList.remove('hidden');
            document.getElementById('post-title').textContent = `${post.title} — Dock & Root Labs`;
            document.getElementById('bc-slug').textContent = post.slug;
            document.getElementById('post-emoji').textContent = post.emoji;
            document.getElementById('post-heading').textContent = post.title;

            document.getElementById('post-tags').innerHTML =
                post.tags.map(t => `<span class="tag">#${t}</span>`).join('');

            document.getElementById('post-meta').innerHTML = `
      <span>📅 ${formatDate(post.date)}</span>
      <span>·</span>
      <span>👤 ${post.author}</span>
      <span>·</span>
      <span>⏱ ${post.readTime} read</span>
      <span>·</span>
      <span style="color:var(--accent-green)">${post.category}</span>
    `;

            // Configure marked
            marked.setOptions({
                highlight: function (code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        return hljs.highlight(code, { language: lang }).value;
                    }
                    return hljs.highlightAuto(code).value;
                },
                breaks: true,
                gfm: true
            });

            // Fetch and render markdown
            fetch(post.markdownFile)
                .then(r => {
                    if (!r.ok) throw new Error('Not found');
                    return r.text();
                })
                .then(md => {
                    document.getElementById('post-content').innerHTML = marked.parse(md);
                    document.querySelectorAll('#post-content pre code').forEach(block => {
                        hljs.highlightElement(block);
                    });
                    document.getElementById('post-loading')?.remove();
                })
                .catch(() => {
                    // Fallback: render excerpt if file not found
                    document.getElementById('post-content').innerHTML = `
          <p>${post.excerpt}</p>
          <p style="color:var(--text-muted);font-style:italic">Full post content is hosted in the GitHub repository.</p>
          <a href="https://github.com/dock-and-root-labs/website/tree/main/blog/posts/${post.markdownFile.split('/').pop()}" target="_blank" class="btn btn-secondary">Read on GitHub</a>
        `;
                    document.getElementById('post-loading')?.remove();
                });
        }
    </script>
</body>

</html>
